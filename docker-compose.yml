version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: openissue
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: openissue
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://openissue:devpassword@postgres:5432/openissue
    depends_on:
      - postgres
      - redis
